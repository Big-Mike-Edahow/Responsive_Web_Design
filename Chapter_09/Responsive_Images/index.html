<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="./static/css/style.css" type="text/css" rel="stylesheet">
    <link href="./static/images/favicon.ico" rel="shortcut icon">
    <title>CSS Responsive Images</title>
</head>

<body>
    <main>
        <section class="center">
            <h1>CSS Responsive Images! 🖼️</h1>
            <br><br>
            <figure>
                <picture>
                    <source srcset="./static/images/squoosh-scones.avif" type="image/avif">
                    <source srcset="./static/images/squoosh-scones.webp" type="image/webp">
                    <img src="./static/images/scones.jpg" alt="A delicious scone, baked to perfection." width="800px" loading="lazy">
                </picture>
            </figure>
        </section>
    </main>
</body>
